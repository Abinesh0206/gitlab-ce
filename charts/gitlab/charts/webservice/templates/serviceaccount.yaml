{{- /* Safely initialize service account values */ -}}
{{- $serviceAccountValues := .Values.serviceAccount | default dict -}}
{{- $globalServiceAccount := .Values.global | default dict | get "serviceAccount" | default dict -}}

{{- /* Safely evaluate enabled status */ -}}
{{- $localEnabled := $serviceAccountValues.enabled | default true -}}
{{- $globalEnabled := $globalServiceAccount.enabled | default true -}}
{{- $enabled := and $localEnabled $globalEnabled -}}

{{- /* Safely evaluate create status */ -}}
{{- $localCreate := $serviceAccountValues.create | default true -}}
{{- $globalCreate := $globalServiceAccount.create | default true -}}
{{- $create := and $localCreate $globalCreate -}}

{{- if and $enabled $create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "gitlab.serviceAccount.name" . }}
  namespace: {{ .Release.Namespace | default "gitlab" }}
  labels:
    {{- include "gitlab.standardLabels" . | nindent 4 }}
    {{- include "gitlab.commonLabels" . | nindent 4 }}
    {{- with $serviceAccountValues.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with $globalServiceAccount.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := merge ($serviceAccountValues.annotations | default dict) ($globalServiceAccount.annotations | default dict) }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
{{- if or $serviceAccountValues.automountServiceAccountToken $globalServiceAccount.automountServiceAccountToken }}
automountServiceAccountToken: {{ $serviceAccountValues.automountServiceAccountToken | default $globalServiceAccount.automountServiceAccountToken | default false }}
{{- end }}
{{- end }}
