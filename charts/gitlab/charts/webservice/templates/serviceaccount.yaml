{{- /* Initialize with empty dictionaries if values don't exist */ -}}
{{- $serviceAccountValues := .Values.serviceAccount | default dict -}}
{{- $globalValues := .Values.global | default dict -}}
{{- $globalServiceAccount := $globalValues.serviceAccount | default dict -}}

{{- /* Safely get enabled status */ -}}
{{- $enabled := and (ne (toString ($serviceAccountValues.enabled | default true)) "false") (ne (toString ($globalServiceAccount.enabled | default true)) "false") -}}

{{- /* Safely get create status */ -}}
{{- $create := and (ne (toString ($serviceAccountValues.create | default true)) "false") (ne (toString ($globalServiceAccount.create | default true)) "false") -}}

{{- if and $enabled $create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (printf "%s-%s" .Release.Name "gitlab") ($globalServiceAccount.name | default $serviceAccountValues.name) }}
  namespace: {{ .Release.Namespace | default "gitlab" }}
  labels:
    app.kubernetes.io/name: {{ template "name" . | default "gitlab" }}
    helm.sh/chart: {{ .Chart.Name | default "gitlab" }}-{{ .Chart.Version | default "0.1.0" }}
    app.kubernetes.io/instance: {{ .Release.Name | default "gitlab" }}
    app.kubernetes.io/managed-by: {{ .Release.Service | default "helm" }}
    {{- with $serviceAccountValues.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end -}}
    {{- with $globalServiceAccount.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := merge ($serviceAccountValues.annotations | default dict) ($globalServiceAccount.annotations | default dict) -}}
  {{- if $annotations -}}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
{{- if or $serviceAccountValues.automountServiceAccountToken $globalServiceAccount.automountServiceAccountToken -}}
automountServiceAccountToken: {{ $serviceAccountValues.automountServiceAccountToken | default $globalServiceAccount.automountServiceAccountToken | default false }}
{{- end }}
{{- end }}
