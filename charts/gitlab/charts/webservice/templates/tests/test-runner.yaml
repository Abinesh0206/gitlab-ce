{{- if and .Values.enabled .Values.helmTests.enabled -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-webservice-test-{{ randAlphaNum 5 | lower }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
  labels:
    app: {{ .Release.Name }}-webservice
    release: {{ .Release.Name }}
spec:
  containers:
  - name: test-runner
    image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
    command: ['sh', '/tests/test_login']
    volumeMounts:
      - name: tests
        mountPath: '/tests'
      - name: root-password
        readOnly: true
        mountPath: /initial_root_password
        subPath: initial_root_password
  volumes:
  - name: tests
    configMap:
      name: {{ .Release.Name }}-webservice-tests
  - name: root-password
    secret:
      secretName: {{ .Release.Name }}-gitlab-initial-root-password
      items:
        - key: password
          path: initial_root_password
  restartPolicy: Never
{{- end }}
