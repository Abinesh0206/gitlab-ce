# Global GitLab settings
global:
  edition: ce  # Community Edition
  hosts:
    domain: gitlab.example.com  # Change to your domain
    https: false               # Set to 'true' if using TLS
    gitlab:
      name: "GitLab CE"
    ingress:
      configureCertmanager: false  # Disable if not using cert-manager

  # Use GitLab Community Edition (CE) images
  communityImages:
    migrations:
      repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-toolbox-ce
    sidekiq:
      repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-sidekiq-ce
    toolbox:
      repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-toolbox-ce
    webservice:
      repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-webservice-ce
    workhorse:
      repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-workhorse-ce

  # Disable unused components
  psql:
    password:
      secret: gitlab-postgres
      key: password
  redis:
    password:
      enabled: false

# Disable tests (fixes "fullname template" error)
webservice:
  tests:
    enabled: false

# Disable GitLab Runner (enable if needed)
gitlab-runner:
  enabled: false

# PostgreSQL (embedded)
postgresql:
  image:
    tag: "13.6"
  persistence:
    enabled: true
    size: 10Gi

# Redis (embedded)
redis:
  enabled: true
  persistence:
    enabled: true

# NGINX Ingress (enable if no existing ingress controller)
nginx-ingress:
  enabled: true
  controller:
    service:
      type: LoadBalancer

# Cert-Manager (disable if not needed)
certmanager:
  install: false

# Prometheus monitoring (disable to reduce resources)
prometheus:
  install: false

# Resource limits (adjust based on your cluster)
resources:
  webservice:
    requests:
      cpu: "500m"
      memory: "1.5Gi"
  sidekiq:
    requests:
      cpu: "300m"
      memory: "1Gi"
  postgresql:
    requests:
      cpu: "200m"
      memory: "512Mi"
