global:
  edition: ce

  hosts:
    domain: gitlab.example.com   # 🔁 Replace with your domain
    externalIP: ""               # optional

  ingress:
    configureCertmanager: false
    tls:
      enabled: false

  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"

    ssl:
      enabled: false                         # SSL disabled
      secret: "gitlab-ssl-dummy"
      serverCA: "dummy-server-ca.pem"
      clientKey: "dummy-client.key"
      clientCertificate: "dummy-client.crt"

  minio:
    enabled: false                           # ✅ moved under `global`

certmanager:
  install: false

nginx-ingress:
  enabled: false

postgresql:
  install: false

redis:
  install: true

gitlab-runner:
  install: false
