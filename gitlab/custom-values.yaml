### Global GitLab settings
global:
  edition: ce
  hosts:
    domain: gitlab.example.com  # CHANGE THIS to your domain
    https: false
    externalIP: ""
    gitlab:
      name: "gitlab.example.com"

  # PostgreSQL configuration with dummy SSL secret
  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"
    ssl:
      enabled: false
      secret: "gitlab-postgresql-dummy-ssl"  # Required even when disabled
      clientMode: "disable"
      serverCA: ""
      clientCertificate: ""
      clientKey: ""

  # Disable unused components
  ingress:
    configureCertmanager: false
    enabled: false
  minio:
    enabled: false

### Create dummy SSL secret first:
# kubectl create secret generic gitlab-postgresql-dummy-ssl --namespace=gitlab --from-literal=server-ca="" --from-literal=client-cert="" --from-literal=client-key=""

### Component configuration
postgresql:
  install: false

redis:
  install: true
  enabled: true

certmanager:
  install: false

nginx-ingress:
  enabled: false

gitlab-runner:
  install: false

### GitLab core services
gitlab:
  webservice:
    enabled: true
    replicas: 1
    service:
      type: ClusterIP
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"

  sidekiq:
    enabled: true
    replicas: 1
    resources:
      limits:
        cpu: "500m"
        memory: "1.5Gi"

  gitlab-shell:
    enabled: true

  toolbox:
    enabled: false

  rails:
    migrations:
      enabled: true

### Monitoring (disabled)
prometheus:
  install: false
grafana:
  install: false
gitlab-exporter:
  enabled: false
