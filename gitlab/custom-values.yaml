global:
  edition: ce
  upgrade:
    checkEnabled: false  # Disables upgrade path validation

  # Host configuration
  hosts:
    domain: gitlab.example.com
    https: false
    externalIP: ""

  # Disable all ingress-related components
  ingress:
    configureCertmanager: false
    enabled: false
    tls:
      enabled: false

  # Disable MinIO (local object storage)
  minio:
    enabled: false

  # External PostgreSQL configuration
  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"
    ssl:
      enabled: false
      secret: "gitlab-ssl-dummy"
      serverCA: "dummy-server-ca.pem"
      clientKey: "dummy-client.key"
      clientCertificate: "dummy-client.crt"

  # Gitaly configuration (required)
  gitaly:
    enabled: true

  # Object storage configuration (dummy values)
  appConfig:
    object_store:
      enabled: false
      connection:
        secret: "gitlab-object-storage-dummy"
        key: "connection"

    # Disable all specific object storage types
    artifacts:
      enabled: false
      object_store:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"
    lfs:
      enabled: false
      object_store:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"
    uploads:
      enabled: false
      object_store:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"
    packages:
      enabled: false
      object_store:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"
    backups:
      enabled: false
      object_store:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"

# Disable additional components
certmanager:
  install: false

nginx-ingress:
  enabled: false

# Database configuration
postgresql:
  install: false  # Using external PostgreSQL

redis:
  install: true  # Using in-cluster Redis

gitlab-runner:
  install: false

# Core GitLab components
gitlab:
  toolbox:
    enabled: false
    backups:
      objectStorage:
        enabled: false

  webservice:
    enabled: true
    service:
      type: ClusterIP  # Change to LoadBalancer if needed

  sidekiq:
    enabled: true

  gitlab-shell:
    enabled: true

  rails:
    migrations:
      enabled: true
