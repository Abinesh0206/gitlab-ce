### Global GitLab settings
global:
  edition: ce
  hosts:
    domain: gitlab.example.com  # CHANGE THIS to your domain
    https: false               # Set to true if using TLS
    externalIP: ""             # Set if you need external IP
    gitlab:
      name: "gitlab.example.com" # Same as domain

  # PostgreSQL configuration (external)
  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"
    # Explicit SSL configuration to prevent the error
    ssl:
      enabled: false
      secret: ""  # Explicit empty secret
      clientMode: "disable"  # Explicitly disable SSL

  # Disable components we don't need
  ingress:
    configureCertmanager: false
    enabled: false
  minio:
    enabled: false  # Using external object storage

### Component configuration
# Disable bundled PostgreSQL
postgresql:
  install: false

# Redis configuration
redis:
  install: true
  enabled: true  # For clarity

# Disable cert-manager
certmanager:
  install: false

# Disable ingress controller
nginx-ingress:
  enabled: false

# Disable runner
gitlab-runner:
  install: false

### GitLab core services configuration
gitlab:
  # Webservice (main GitLab component)
  webservice:
    enabled: true
    replicas: 1
    service:
      type: ClusterIP
    resources:
      requests:
        cpu: "500m"
        memory: "1.5Gi"
      limits:
        cpu: "1"
        memory: "2Gi"

  # Sidekiq (background jobs)
  sidekiq:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: "300m"
        memory: "1Gi"
      limits:
        cpu: "500m"
        memory: "1.5Gi"

  # GitLab Shell
  gitlab-shell:
    enabled: true
    replicas: 1
    service:
      type: ClusterIP

  # Toolbox (disabled)
  toolbox:
    enabled: false

  # Rails migrations
  rails:
    migrations:
      enabled: true

### Monitoring (disabled)
prometheus:
  install: false
grafana:
  install: false
gitlab-exporter:
  enabled: false

