global:
  edition: ce

  hosts:
    domain: gitlab.example.com   # ✅ Change this to your actual domain
    externalIP: ""               # optional

  ingress:
    configureCertmanager: false
    tls:
      enabled: false

  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"

    ssl:
      enabled: false
      secret: "gitlab-ssl-dummy"       # ✅ dummy secret
      serverCA: "dummy-ca.pem"         # ✅ dummy CA file
      clientKey: "dummy-client.key"    # ✅ dummy client key
      clientCert: "dummy-client.crt"   # ✅ dummy client cert

certmanager:
  install: false

nginx-ingress:
  enabled: false

postgresql:
  install: false

redis:
  install: true

minio:
  enabled: false

gitlab-runner:
  install: false
