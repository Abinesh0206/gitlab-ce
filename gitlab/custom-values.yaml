## GitLab CE values.yaml with internal Redis, Gitaly, and external PostgreSQL
## Cert-manager and issuer requirements fully disabled

global:
  ## GitLab edition (ce/ee)
  edition: ce
  
  ## Domain settings
  hosts:
    domain: gitlab.example.com
    https: false
    externalIP: ""
    gitlab:
      name: "gitlab.example.com"
  
  ## PostgreSQL configuration (external)
  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"
  
  ## Email configuration
  email:
    enabled: false
  
  ## Ingress and TLS settings (fully disabled)
  ingress:
    configureCertmanager: false
    enabled: false
    tls:
      enabled: false
  
  ## Object storage configuration (all disabled)
  appConfig:
    artifacts:
      enabled: false
    lfs:
      enabled: false
    uploads:
      enabled: false
    packages:
      enabled: false
    externalDiffs:
      enabled: false
    terraformState:
      enabled: false
    dependencyProxy:
      enabled: false

  ## MinIO disabled
  minio:
    enabled: false

## Redis configuration (internal)
redis:
  install: true
  image:
    tag: 7.0.11
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""  # Set your storage class if needed
  metrics:
    enabled: false

## PostgreSQL (disabled - using external)
postgresql:
  install: false

## GitLab components
gitlab:
  ## Gitaly (Git repository storage - now properly enabled)
  gitaly:
    enabled: true
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi  # Recommended minimum for production
      storageClass: ""  # Set if needed
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  
  ## Webservice
  webservice:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1.5Gi
      limits:
        cpu: 1
        memory: 2Gi
  
  ## Sidekiq
  sidekiq:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 1.5Gi
  
  ## GitLab Shell
  gitlab-shell:
    enabled: true
    replicas: 1
  
  ## Toolbox
  toolbox:
    enabled: false

## Monitoring (all disabled)
prometheus:
  install: false
grafana:
  install: false
gitlab-exporter:
  enabled: false

## Cert-manager (fully disabled with issuer bypass)
certmanager:
  install: false
  issuer:
    email: ""  # Empty string to bypass validation
    server: ""

## NGINX Ingress (disabled)
nginx-ingress:
  enabled: false

## GitLab Runner (disabled)
gitlab-runner:
  install: false
