### Global GitLab settings
global:
  edition: ce
  hosts:
    domain: gitlab.example.com  # MUST CHANGE to your real domain
    https: false
    externalIP: ""
    gitlab:
      name: "gitlab.example.com"  # MUST match domain above

  # PostgreSQL configuration
  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"
    ssl:
      enabled: false
      secret: "gitlab-postgresql-ssl-dummy"  # Required dummy secret
      clientMode: "disable"
      # These must match the keys in your dummy secret
      serverCA: "server-ca"  
      clientCertificate: "client-cert"
      clientKey: "client-key"

  # Disable unused components
  ingress:
    configureCertmanager: false
    enabled: false
  minio:
    enabled: false

### Component configuration
postgresql:
  install: false

redis:
  install: true
  enabled: true

certmanager:
  install: false

nginx-ingress:
  enabled: false

gitlab-runner:
  install: false

### GitLab core services
gitlab:
  webservice:
    enabled: true
    replicas: 1
    service:
      type: ClusterIP
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"

  sidekiq:
    enabled: true
    replicas: 1
    resources:
      limits:
        cpu: "500m"
        memory: "1.5Gi"

  gitlab-shell:
    enabled: true

  toolbox:
    enabled: false

  rails:
    migrations:
      enabled: true

### Monitoring (disabled)
prometheus:
  install: false
grafana:
  install: false
gitlab-exporter:
  enabled: false
