global:
  edition: ce

  hosts:
    domain: gitlab.example.com
    externalIP: ""

  ingress:
    configureCertmanager: false
    tls:
      enabled: false

  minio:
    enabled: false

  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"
    ssl:
      enabled: false
      secret: "gitlab-ssl-dummy"
      serverCA: "dummy-server-ca.pem"
      clientKey: "dummy-client.key"
      clientCertificate: "dummy-client.crt"

certmanager:
  install: false

nginx-ingress:
  enabled: false

postgresql:
  install: false

redis:
  install: true

gitlab-runner:
  install: false

gitlab:
  toolbox:
    backups:
      objectStorage:
        enabled: false
        config: {}  # Empty config since disabled

  rails:
    artifacts:
      objectStore:
        enabled: false
        connection: {}  # Empty connection since disabled
    lfs:
      objectStore:
        enabled: false
        connection: {}  # Empty connection since disabled
    uploads:
      objectStore:
        enabled: false
        connection: {}  # Empty connection since disabled
    packages:
      objectStore:
        enabled: false
        connection: {}  # Empty connection since disabled
    backups:
      objectStore:
        enabled: false
        connection: {}  # Empty connection since disabled

# If you need any object storage in the future, configure like this:
# global:
#   appConfig:
#     object_store:
#       enabled: true
#       connection:
#         secret: gitlab-object-storage
#         key: connection
