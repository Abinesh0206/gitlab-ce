global:
  edition: ce
  hosts:
    domain: gitlab.example.com
    externalIP: ""
  
  ingress:
    configureCertmanager: false
    enabled: false
    tls:
      enabled: false
  
  minio:
    enabled: false
  
  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"
    ssl:
      enabled: false
      secret: "gitlab-ssl-dummy"
      serverCA: "dummy-server-ca.pem"
      clientKey: "dummy-client.key"
      clientCertificate: "dummy-client.crt"

  # Disable all object storage
  appConfig:
    object_store:
      enabled: false
      connection: {}
      storage_options: {}

# Disable additional components
certmanager:
  install: false

nginx-ingress:
  enabled: false

# Use external PostgreSQL
postgresql:
  install: false

# Use in-cluster Redis (enabled)
redis:
  install: true

# Disable GitLab Runner
gitlab-runner:
  install: false

# Disable all object storage backends
gitlab:
  toolbox:
    backups:
      objectStorage:
        enabled: false
        config:
          secret: "gitlab-object-storage-dummy"
          key: "config"

  rails:
    artifacts:
      objectStore:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"
    lfs:
      objectStore:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"
    uploads:
      objectStore:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"
    packages:
      objectStore:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"
    backups:
      objectStore:
        enabled: false
        connection:
          secret: "gitlab-object-storage-dummy"
          key: "connection"
