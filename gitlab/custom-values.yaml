global:
  edition: ce

  hosts:
    domain: gitlab.example.com   # 🔁 change to your domain
    externalIP: ""               # optional

  ingress:
    configureCertmanager: false
    tls:
      enabled: false

  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"

    ssl:
      enabled: false                         # 🔴 SSL disabled
      secret: "gitlab-ssl-dummy"             # 🔑 dummy secret (must exist)
      serverCA: "dummy-server-ca.pem"        # 🔑 dummy file
      clientKey: "dummy-client.key"          # 🔑 dummy file
      clientCertificate: "dummy-client.crt"  # ✅ THIS LINE is what was missing

certmanager:
  install: false

nginx-ingress:
  enabled: false

postgresql:
  install: false

redis:
  install: true

minio:
  enabled: false

gitlab-runner:
  install: false
