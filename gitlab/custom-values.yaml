# ============== CORE CONFIGURATION ==============
global:
  edition: ce
  upgrade:
    checkEnabled: false  # Disable upgrade checks

  # Host configuration
  hosts:
    domain: gitlab.example.com  # CHANGE THIS
    https: false
    externalIP: ""

  # Disable all ingress-related components
  ingress:
    configureCertmanager: false
    enabled: false
    tls:
      enabled: false

  # Disable MinIO
  minio:
    enabled: false

  # External PostgreSQL
  psql:
    host: "dev-db.cyxw2mqqud77.us-east-1.rds.amazonaws.com"
    port: 5432
    database: "mydatabase"
    username: "dbadmin"
    password:
      secret: "gitlab-postgres-secret"
      key: "password"
    ssl:
      enabled: false

  # Gitaly configuration
  gitaly:
    enabled: true

  # Object storage (disabled)
  appConfig:
    object_store:
      enabled: false
      connection:
        secret: "gitlab-object-storage-dummy"
        key: "connection"

# ============== COMPONENT CONFIGURATION ==============
certmanager:
  install: false

nginx-ingress:
  enabled: false

# Redis configuration (fixed)
redis:
  install: true  # CORRECT: Use only this, not 'enabled'

# Disable bundled PostgreSQL
postgresql:
  install: false

# Disable GitLab Runner
gitlab-runner:
  install: false

# ============== GITLAB CORE SERVICES ==============
gitlab:
  toolbox:
    enabled: false

  webservice:
    enabled: true
    service:
      type: ClusterIP  # Change to LoadBalancer if needed
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"

  sidekiq:
    enabled: true
    resources:
      limits:
        cpu: "500m"
        memory: "1Gi"

  gitlab-shell:
    enabled: true

  rails:
    migrations:
      enabled: true
